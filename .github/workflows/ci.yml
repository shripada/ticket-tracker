name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticket_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.10.5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            ticket-tracker/pnpm-lock.yaml

      - name: Install root deps
        run: pnpm install

      - name: Install app deps
        working-directory: ticket-tracker
        run: pnpm install

      - name: Check formatting
        run: pnpm run format:check

      - name: Run Prisma migrate
        working-directory: ticket-tracker
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticket_tracker

      - name: Install Playwright browsers
        working-directory: ticket-tracker
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ticket-tracker
        run: pnpm exec playwright test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticket_tracker
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-only-insecure-secret-not-used-in-prod' }}
          APP_URL: http://localhost:3000
